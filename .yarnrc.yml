compressionLevel: 0

enableGlobalCache: false

# Disable install lifecycle scripts globally. Only packages explicitly
# allowlisted in package.json#dependenciesMeta[pkg].built will run them.
# Mitigates supply-chain attacks that rely on malicious postinstall
# scripts (e.g. Shai-Hulud, event-stream).
enableScripts: false

nodeLinker: node-modules

npmRegistryServer: 'https://registry.npmjs.org'
npmScopes:
  ornikar:
    npmRegistryServer: https://europe-west1-npm.pkg.dev/ornikar-images/npm-packages/

plugins:
  - path: .yarn/plugins/@yarnpkg/plugin-engines.cjs
    spec: 'https://raw.githubusercontent.com/devoto13/yarn-plugin-engines/main/bundles/%40yarnpkg/plugin-engines.js'
  - path: .yarn/plugins/@yarnpkg/plugin-preinstall.cjs
    spec: './.yarn/plugins/@yarnpkg/plugin-preinstall.cjs'

supportedArchitectures:
  cpu:
    - x64
    - arm64
  libc:
    - glibc
  os:
    - linux
    - darwin

yarnPath: .yarn/releases/yarn-4.13.0.cjs
